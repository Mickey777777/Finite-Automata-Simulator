<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Finite Automata Simulator</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&display=swap">
    <style>
        :root {
            --bg: #0a0a0f;
            --surface: #111118;
            --surface2: #16161f;
            --border: #1e1e2e;
            --accent: #7c6af7;
            --accent-dim: rgba(124, 106, 247, 0.12);
            --text: #e8e8f0;
            --muted: #5a5a7a;
            --green: #3ecf8e;
            --red: #f76a6a;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            display: grid;
            grid-template-columns: 380px 1fr;
            grid-template-rows: auto 1fr;
            height: 100vh;
            font-family: 'JetBrains Mono', monospace;
            background: var(--bg);
            color: var(--text);
        }

        header {
            grid-column: 1 / -1;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 14px 24px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        header h1 {
            font-size: 1rem;
            font-weight: 700;
            color: var(--accent);
            letter-spacing: 0.08em;
        }

        header span {
            font-size: 0.7rem;
            color: var(--muted);
        }

        .panel {
            background: var(--surface);
            border-right: 1px solid var(--border);
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 0;
        }

        .panel::-webkit-scrollbar {
            width: 4px;
        }
        .panel::-webkit-scrollbar-track {
            background: transparent;
        }
        .panel::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 4px;
        }

        .step-group {
            display: flex;
            flex-direction: column;
            gap: 14px;
            padding-bottom: 18px;
            margin-bottom: 18px;
            border-bottom: 1px solid var(--border);
        }

        .step-group:last-child {
            border-bottom: none;
            margin-bottom: 0;
            padding-bottom: 0;
        }

        .step-header {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .step-num {
            width: 22px;
            height: 22px;
            border-radius: 50%;
            background: var(--accent-dim);
            color: var(--accent);
            font-size: 0.7rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .step-title {
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--text);
        }

        .section {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        label {
            font-size: 0.65rem;
            color: var(--muted);
            letter-spacing: 0.1em;
            text-transform: uppercase;
        }

        .hint {
            font-size: 0.6rem;
            color: var(--muted);
            opacity: 0.7;
            letter-spacing: 0;
            text-transform: none;
        }

        input {
            background: var(--bg);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 10px 12px;
            border-radius: 8px;
            font-size: 0.8rem;
            font-family: 'JetBrains Mono', monospace;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-dim);
        }

        input::placeholder {
            color: #2e2e45;
        }

        button {
            width: 100%;
            padding: 11px;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 0.8rem;
            font-family: 'JetBrains Mono', monospace;
            font-weight: 600;
            cursor: pointer;
            letter-spacing: 0.05em;
            transition: background 0.15s, transform 0.1s;
        }

        button:hover {
            background: #6a58e0;
        }

        button:active {
            transform: scale(0.98);
        }

        .btn-build {
            margin-top: 10px;
            background: var(--accent);
        }

        .sim-row {
            display: flex;
            gap: 8px;
        }

        .sim-row input {
            flex: 1;
        }

        .sim-row button {
            width: auto;
            padding: 10px 18px;
        }

        .canvas-wrap {
            position: relative;
            overflow: hidden;
            background: var(--bg);
            background-image: radial-gradient(circle, #1a1a2a 1px, transparent 1px);
            background-size: 24px 24px;
        }

        .canvas-hint {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            color: var(--muted);
            opacity: 0.5;
            pointer-events: none;
            user-select: none;
        }

        .canvas-hint-icon {
            font-size: 2.4rem;
            margin-bottom: 10px;
            opacity: 0.4;
        }

        .canvas-hint-text {
            font-size: 0.75rem;
            font-family: 'JetBrains Mono', monospace;
            line-height: 1.6;
        }

        #dfa-canvas {
            width: 100%;
            height: 100%;
        }

        #delta-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.78rem;
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid var(--border);
        }

        #delta-table th {
            background: var(--bg);
            color: var(--accent);
            padding: 8px 10px;
            border-bottom: 1px solid var(--border);
            text-align: center;
            font-weight: 600;
        }

        #delta-table td {
            text-align: center;
            border-bottom: 1px solid #151520;
        }

        #delta-table tr:last-child td {
            border-bottom: none;
        }

        #delta-table td:first-child {
            color: var(--muted);
            background: var(--bg);
            padding: 4px 10px;
            border-right: 1px solid var(--border);
            font-weight: 600;
        }

        #delta-table td input {
            border: none;
            background: transparent;
            text-align: center;
            padding: 8px 6px;
            width: 100%;
            color: var(--text);
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.78rem;
            outline: none;
        }

        #delta-table td input:focus {
            background: var(--accent-dim);
        }

        .delta-empty {
            text-align: center;
            padding: 16px;
            color: var(--muted);
            opacity: 0.5;
            font-size: 0.7rem;
            border: 1px dashed var(--border);
            border-radius: 8px;
        }

        #result-box {
            display: none;
            padding: 12px;
            border-radius: 8px;
            font-size: 0.8rem;
        }

        #result-box.accept {
            display: block;
            border: 1px solid var(--green);
            color: var(--green);
            background: rgba(62, 207, 142, 0.08);
        }

        #result-box.reject {
            display: block;
            border: 1px solid var(--red);
            color: var(--red);
            background: rgba(247, 106, 106, 0.08);
        }

        #result-box .result-path {
            margin-top: 6px;
            font-size: 0.7rem;
            color: var(--muted);
        }

        .mode-toggle {
            display: flex;
            gap: 4px;
            margin-left: auto;
            background: var(--bg);
            padding: 4px;
            border-radius: 8px;
            border: 1px solid var(--border);
        }

        .mode-btn {
            width: auto;
            padding: 4px 16px;
            border-radius: 6px;
            background: transparent;
            color: var(--muted);
            font-size: 0.75rem;
        }

        .mode-btn.active {
            background: var(--accent);
            color: white;
        }
    </style>
</head>

<body>
    <header>
        <h1>DFA Visualizer</h1>
        <span>M = (Q, Σ, δ, q₀, F)</span>
        <div class="mode-toggle">
            <button id="btn-dfa" class="mode-btn active">DFA</button>
            <button id="btn-nfa" class="mode-btn">NFA</button>
        </div>
    </header>

    <div class="panel">
        <div class="step-group">
            <div class="step-header">
                <div class="step-num">1</div>
                <div class="step-title">오토마타 정의</div>
            </div>
            <div class="section">
                <label>Q — 상태집합</label>
                <input id="inp-states" type="text" placeholder="q0, q1, q2">
                <span class="hint">쉼표로 구분하여 상태를 입력하세요</span>
            </div>
            <div class="section">
                <label>Σ — 알파벳</label>
                <input id="inp-alpha" type="text" placeholder="0, 1">
                <span class="hint">쉼표로 구분하여 심볼을 입력하세요</span>
            </div>
            <div class="section">
                <label>q₀ — 시작 상태</label>
                <input id="inp-start" type="text" placeholder="q0">
            </div>
            <div class="section">
                <label>F — 수락 상태</label>
                <input id="inp-accept" type="text" placeholder="q2">
                <span class="hint">여러 개일 경우 쉼표로 구분</span>
            </div>
        </div>

        <div class="step-group">
            <div class="step-header">
                <div class="step-num">2</div>
                <div class="step-title">전이 함수 (δ)</div>
            </div>
            <div class="section">
                <div id="delta-wrap">
                    <div class="delta-empty">위에서 상태와 알파벳을 입력하면 테이블이 생성됩니다</div>
                </div>
                <table id="delta-table" style="display:none;">
                    <thead><tr id="delta-head"></tr></thead>
                    <tbody id="delta-body"></tbody>
                </table>
                <button id="btn-build" class="btn-build">DFA 시각화</button>
            </div>
        </div>

        <div class="step-group">
            <div class="step-header">
                <div class="step-num">3</div>
                <div class="step-title">시뮬레이션</div>
            </div>
            <div class="section">
                <label>입력 문자열</label>
                <div class="sim-row">
                    <input id="inp-str" type="text" placeholder="0110">
                    <button id="btn-sim">실행</button>
                </div>
            </div>
            <div id="result-box"></div>
        </div>
    </div>

    <div class="canvas-wrap">
    <div id="canvas-placeholder" class="canvas-hint">
        <div class="canvas-hint-icon">◎</div>
        <div class="canvas-hint-text">좌측에서 DFA를 정의한 뒤<br>시각화 버튼을 눌러주세요</div>
    </div>
    <svg id="dfa-canvas">
        <defs>
            <marker id="arrow" markerWidth="8" markerHeight="8"
                    refX="7" refY="3" orient="auto">
                <path d="M0,0 L0,6 L8,3 z" fill="#3a3a5a"/>
            </marker>
            <marker id="arrow-active" markerWidth="8" markerHeight="8"
                    refX="7" refY="3" orient="auto">
                <path d="M0,0 L0,6 L8,3 z" fill="#7c6af7"/>
            </marker>
            <marker id="arrow-accept" markerWidth="8" markerHeight="8"
                    refX="7" refY="3" orient="auto">
                <path d="M0,0 L0,6 L8,3 z" fill="#3ecf8e"/>
            </marker>
            <marker id="arrow-reject" markerWidth="8" markerHeight="8"
                    refX="7" refY="3" orient="auto">
                <path d="M0,0 L0,6 L8,3 z" fill="#f76a6a"/>
            </marker>
        </defs>
        <g id="canvas-g"></g>
    </svg>
    </div>

    <script>
        let mode = 'dfa';
        document.getElementById('btn-dfa').addEventListener('click', () => {
            mode = 'dfa';
            document.getElementById('btn-dfa').classList.add('active');
            document.getElementById('btn-nfa').classList.remove('active');
        });

        document.getElementById('btn-nfa').addEventListener('click', () => {
            mode = 'nfa';
            document.getElementById('btn-nfa').classList.add('active');
            document.getElementById('btn-dfa').classList.remove('active');
            alert('NFA 모드는 준비 중입니다.');
        });

        let positions = {};
        let simPath = [];

        function parseList(str){
            let v = str;

            v = v.split(',').map(x => x.trim());
            v = v.filter(Boolean);
            return v
        }

        function rebuildDeltaTable(){
            const head = document.getElementById('delta-head');
            head.innerHTML = '<th>δ</th>';

            const sigma = parseList(document.getElementById('inp-alpha').value);
            head.innerHTML += sigma.map(s => `<th>${s}</th>`).join('');

            const body = document.getElementById('delta-body');
            body.innerHTML = '';

            const states = parseList(document.getElementById('inp-states').value);
            const table = document.getElementById('delta-table');
            const wrap = document.getElementById('delta-wrap');

            if (states.length === 0 || sigma.length === 0) {
                table.style.display = 'none';
                wrap.style.display = '';
                return;
            }

            table.style.display = '';
            wrap.style.display = 'none';

            states.forEach(s => {
                const tr = document.createElement('tr');
                tr.dataset.state = s;
                tr.innerHTML = `<td>${s}</td>`;
                tr.innerHTML += sigma.map(sym => `<td data-sym="${sym}"><input type="text"></td>`).join('');
                document.getElementById('delta-body').appendChild(tr);
            });
        }

        function buildDFA(){
            const states = parseList(document.getElementById('inp-states').value);
            const svg = document.getElementById('dfa-canvas');
            const W = svg.clientWidth;
            const H = svg.clientHeight;
            const cx = W / 2;
            const cy = H / 2;
            const r = Math.min(W, H) * 0.35;
            const n = states.length;

            states.forEach((state, i) => {
                const angle = (2*Math.PI*(i/n) - Math.PI/2);
                positions[state] = {
                    x: cx + r*Math.cos(angle),
                    y: cy + r*Math.sin(angle)
                };
            });

            simPath = [];
            document.getElementById('canvas-placeholder').style.display = 'none';
            renderDFA();
        }

        function renderDFA(path) {
            const states = parseList(document.getElementById('inp-states').value);
            const start  = document.getElementById('inp-start').value.trim();
            const accept = parseList(document.getElementById('inp-accept').value);

            const g = document.getElementById('canvas-g');
            g.innerHTML = '';

            drawEdges(g, path);

            states.forEach(state => {
                const { x, y } = positions[state];
                const strokeColor = (state === start) ? '#7c6af7' : '#444';

                const circle = makeSVG('circle', {
                    cx: x, cy: y, r: 28,
                    fill: '#111118', stroke: strokeColor,
                    'stroke-width': 2
                });

                const txt = makeSVG('text', {
                    x, y,
                    'text-anchor': 'middle',
                    'dominant-baseline': 'central',
                    fill: 'white', 'font-size': '13'
                });
                txt.textContent = state;

                g.appendChild(circle);

                if(accept.includes(state)){
                    const outerCircle = makeSVG('circle', {
                        cx: x, cy: y, r: 35,
                        fill: 'none', stroke: '#3ecf8e', 'stroke-width': 1.5
                    });
                    g.appendChild(outerCircle);
                }

                g.appendChild(txt);
                makeDraggable(circle, state);
            });
        }

        function drawEdges(g, simPath) {
            const states = parseList(document.getElementById('inp-states').value);
            const sigma  = parseList(document.getElementById('inp-alpha').value);
            const accept = parseList(document.getElementById('inp-accept').value);
            const R = 28;

            const delta = {};
            document.getElementById('delta-body').querySelectorAll('tr').forEach(tr => {
                const state = tr.dataset.state;
                delta[state] = {};
                tr.querySelectorAll('td[data-sym]').forEach(td => {
                    delta[state][td.dataset.sym] = td.querySelector('input').value.trim();
                });
            });

            const edgeMap = {};
            states.forEach(from => {
                sigma.forEach(sym => {
                    const to = delta[from][sym];
                    if (!to) return;
                    const key = `${from}→${to}`;
                    if (!edgeMap[key]) edgeMap[key] = { from, to, labels: [] };
                    edgeMap[key].labels.push(sym);
                });
            });

            Object.values(edgeMap).forEach(({ from, to, labels }) => {
                const label = labels.join(', ');

                // simPath에서 이 간선 색 결정
                let color = '#3a3a5a';
                if (simPath) {
                    for (let i = 0; i < simPath.length - 1; i++) {
                        if (simPath[i] === from && simPath[i+1] === to) {
                            const lastState = simPath[simPath.length - 1];
                            const isLast = i === simPath.length - 2;
                            if (isLast) {
                                color = accept.includes(lastState) ? '#3ecf8e' : '#f76a6a';
                            } else {
                                color = '#7c6af7';
                            }
                        }
                    }
                }

                if (from === to) {
                    drawSelfLoop(g, positions[from], label, R, color);
                } else {
                    drawArrow(g, positions[from], positions[to], label, R, color);
                }
            });
        }

        function drawArrow(g, p1, p2, label, R, color) {
            const dx = p2.x - p1.x, dy = p2.y - p1.y;
            const dist = Math.sqrt(dx*dx + dy*dy);
            const nx = dx/dist, ny = dy/dist;

            const sx = p1.x + nx * R;
            const sy = p1.y + ny * R;
            const ex = p2.x - nx * (R + 8);
            const ey = p2.y - ny * (R + 8);

            const mx = (sx + ex) / 2 + ny * 40;
            const my = (sy + ey) / 2 - nx * 40;

            const markerEnd = color === '#3ecf8e' ? 'url(#arrow-accept)'
                            : color === '#f76a6a' ? 'url(#arrow-reject)'
                            : color === '#7c6af7' ? 'url(#arrow-active)'
                            : 'url(#arrow)';

            const path = makeSVG('path', {
                d: `M ${sx} ${sy} Q ${mx} ${my} ${ex} ${ey}`,
                fill: 'none', stroke: color,
                'stroke-width': 1.8, 'marker-end': markerEnd
            });
            g.appendChild(path);

            const lx = mx + ny * 10;
            const ly = my - nx * 10;

            const bg = makeSVG('rect', {
                x: lx - 10, y: ly - 9, width: 20, height: 16,
                fill: '#0a0a0f', rx: 3
            });
            g.appendChild(bg);

            const txt = makeSVG('text', {
                x: lx, y: ly,
                'text-anchor': 'middle', 'dominant-baseline': 'central',
                fill: '#c0c0d8', 'font-family': 'JetBrains Mono, monospace',
                'font-size': '11', 'font-weight': '600'
            });
            txt.textContent = label;
            g.appendChild(txt);
        }

        function drawSelfLoop(g, pos, label, R, color) {
            const { x, y } = pos;

            const markerEnd = color === '#3ecf8e' ? 'url(#arrow-accept)'
                            : color === '#f76a6a' ? 'url(#arrow-reject)'
                            : color === '#7c6af7' ? 'url(#arrow-active)'
                            : 'url(#arrow)';

            const loop = makeSVG('path', {
                d: `M ${x-8} ${y-R} A 20 20 0 1 1 ${x+8} ${y-R}`,
                fill: 'none', stroke: color,
                'stroke-width': 1.8, 'marker-end': markerEnd
            });
            g.appendChild(loop);

            const bg = makeSVG('rect', {
                x: x - 10, y: y - R - 50, width: 20, height: 16,
                fill: '#0a0a0f', rx: 3
            });
            g.appendChild(bg);

            const txt = makeSVG('text', {
                x: x, y: y - R - 42,
                'text-anchor': 'middle', 'dominant-baseline': 'central',
                fill: '#c0c0d8', 'font-family': 'JetBrains Mono, monospace',
                'font-size': '11', 'font-weight': '600'
            });
            txt.textContent = label;
            g.appendChild(txt);
        }
        
        function makeSVG(tag, attrs){
            const el = document.createElementNS('http://www.w3.org/2000/svg', tag);
            Object.entries(attrs).forEach(([k, v]) => el.setAttribute(k, v));
            return el;
        }

        function makeDraggable(el, state) {
            let dragging = false, ox, oy;
            el.addEventListener('mousedown', e => {
                dragging = true;
                ox = e.clientX - positions[state].x;
                oy = e.clientY - positions[state].y;
                e.stopPropagation();
            });
            window.addEventListener('mousemove', e => {
                if (!dragging) return;
                positions[state].x = e.clientX - ox;
                positions[state].y = e.clientY - oy;
                renderDFA(simPath.length > 0 ? simPath : null);
            });
            window.addEventListener('mouseup', () => { dragging = false; });
        }

        function simulate(){
            const input = document.getElementById('inp-str').value;
            const start = document.getElementById('inp-start').value.trim();
            const accept = parseList(document.getElementById('inp-accept').value);

            const delta = {};
            document.getElementById('delta-body').querySelectorAll('tr').forEach(tr => {
                const state = tr.dataset.state;
                delta[state] = {};
                tr.querySelectorAll('td[data-sym]').forEach(td => {
                    delta[state][td.dataset.sym] = td.querySelector('input').value.trim();
                });
            });

            let current = start;
            simPath = [current];
            for(const sym of input){
                const nxt = delta[current][sym];
                if(!nxt) break;
                current = nxt;
                simPath.push(current);
            }

            const isAccept = accept.includes(current);
            const rb = document.getElementById('result-box');
            rb.className = isAccept ? 'accept' : 'reject';
            rb.innerHTML = `
                <strong>${isAccept ? 'ACCEPT' : 'REJECT'}</strong>
                <div class="result-path">경로: ${simPath.join(' → ')}</div>
            `;

            renderDFA(simPath);
        }

        (function() {
            const svg = document.getElementById('dfa-canvas');
            const g = document.getElementById('canvas-g');
            let vx = 0, vy = 0, scale = 1;
            let panning = false, px, py;

            function applyTransform() {
                g.setAttribute('transform', `translate(${vx},${vy}) scale(${scale})`);
            }

            svg.addEventListener('mousedown', e => {
                if (e.target.closest('circle') || e.target.closest('text')) return;
                panning = true;
                px = e.clientX - vx;
                py = e.clientY - vy;
            });
            window.addEventListener('mousemove', e => {
                if (!panning) return;
                vx = e.clientX - px;
                vy = e.clientY - py;
                applyTransform();
            });
            window.addEventListener('mouseup', () => { panning = false; });
            svg.addEventListener('wheel', e => {
                e.preventDefault();
                const d = e.deltaY > 0 ? 0.9 : 1.1;
                scale = Math.min(3, Math.max(0.3, scale * d));
                applyTransform();
            }, { passive: false });
        })();

        document.getElementById('inp-states').addEventListener('input', rebuildDeltaTable);
        document.getElementById('inp-alpha').addEventListener('input', rebuildDeltaTable);
        document.getElementById('btn-build').addEventListener('click', buildDFA);
        document.getElementById('btn-sim').addEventListener('click', simulate);
    </script>

</body>

</html>
